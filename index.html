<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مینی‌اپ هوشمند بله</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #512da8;
            --primary-light: #7c52ca;
            --bg-color: #f4f6fa;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-color: #00b894;
            --input-border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px 24px;
            text-align: center;
            margin: auto;
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }

        .profile-section {
            margin-bottom: 22px;
        }

        .avatar-placeholder {
            width: 84px;
            height: 84px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-color));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(81, 45, 168, 0.2);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .card {
            background: #f8fafc;
            padding: 12px 14px;
            border-radius: 16px;
            border: 1px solid #edf2f7;
            text-align: right;
        }

        .card-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .card-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
        }

        /* بخش جدید ورود متن */
        .input-section {
            margin: 20px 0;
            text-align: right;
        }

        .input-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            display: block;
            padding-right: 4px;
        }

        .custom-textarea {
            width: 100%;
            height: 90px;
            padding: 14px;
            border-radius: 16px;
            border: 2px solid var(--input-border);
            background-color: #f8fafc;
            color: var(--text-main);
            font-size: 14px;
            resize: none;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        .custom-textarea:focus {
            border-color: var(--primary-light);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(124, 82, 202, 0.1);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 184, 148, 0.1);
            color: var(--accent-color);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(81, 45, 168, 0.15);
        }

        .btn-primary:active {
            transform: scale(0.98);
            background-color: #412287;
        }

        .btn-secondary {
            background-color: #f1f2f6;
            color: var(--text-main);
        }

        .btn-secondary:active {
            transform: scale(0.98);
            background-color: #e4e7eb;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.5); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 184, 148, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 184, 148, 0); }
        }

        .footer-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- هدر و آواتار -->
        <div class="profile-section">
            <div class="avatar-placeholder" id="user-avatar">📱</div>
            <h1 id="user-greeting">سلام کاربر گرامی!</h1>
            <p class="subtitle">به مینی‌اپ هوشمند بله خوش آمدید. متن خود را در باکس زیر بنویسید تا به بک‌اند سرورلس ارسال شود.</p>
            
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>اتصال امن به بله برقرار است</span>
            </div>
        </div>

        <!-- کارت‌های دیتای کلاینت -->
        <div class="info-cards">
            <div class="card">
                <div class="card-title">نام کاربری</div>
                <div class="card-value" id="username">بارگذاری...</div>
            </div>
            <div class="card">
                <div class="card-title">وضعیت هویت</div>
                <div class="card-value" id="user-id">بارگذاری...</div>
            </div>
            <div class="card" style="grid-column: span 2;">
                <div class="card-title">پلتفرم اجرا کننده</div>
                <div class="card-value" id="platform">بارگذاری...</div>
            </div>
        </div>

        <!-- پنجره جدید برای نوشتن متن تست -->
        <div class="input-section">
            <label class="input-label" for="test-message">متن ارسالی به ربات:</label>
            <textarea class="custom-textarea" id="test-message" placeholder="پیام خود را اینجا بنویسید... مثلاً: سلام کلادفلر!"></textarea>
        </div>

        <!-- دکمه‌ها -->
        <div class="btn-group">
            <button class="btn-primary" id="send-data-btn">ارسال متن به بک‌اند پایتون/ورکر</button>
            <button class="btn-secondary" id="close-btn">بستن مینی‌اپ</button>
        </div>

        <div class="footer-text">توسعه یافته برای تست بستر مینی‌اپ پیام‌رسان بله</div>
    </div>

    <script>
        // مقداردهی اولیه به لایه مینی‌اپ
        const webapp = window.Telegram.WebApp;
        webapp.ready();
        webapp.expand(); 

        // دریافت اطلاعات کلاینت و اعمال Fallback هوشمند برای کلاینت بله
        const initDataUnsafe = webapp.initDataUnsafe;

        if (initDataUnsafe && initDataUnsafe.user) {
            const user = initDataUnsafe.user;
            document.getElementById('user-greeting').innerText = `سلام ${user.first_name || 'کاربر'} عزیز!`;
            document.getElementById('username').innerText = user.username ? `@${user.username}` : 'ندارد';
            document.getElementById('user-id').innerText = "تایید کلاینت 🟢";
            if(user.first_name) {
                document.getElementById('user-avatar').innerText = user.first_name.charAt(0);
            }
        } else {
            // مقادیر جایگزین پایدار برای بله
            document.getElementById('user-greeting').innerText = "به مینی‌اپ بله خوش آمدید!";
            document.getElementById('username').innerText = "ارسال امن";
            document.getElementById('user-id').innerText = "تایید در بک‌اند 🔒";
            document.getElementById('user-avatar').innerText = "📱";
        }

        // نمایش پلتفرم
        document.getElementById('platform').innerText = webapp.platform || "Bale Messenger Client";

        // عملکرد دکمه ارسال دیتای کاستوم شده با متن چت‌باکس
        document.getElementById('send-data-btn').addEventListener('click', () => {
            const userText = document.getElementById('test-message').value.trim();
            
            // اگر باکس خالی بود یک متن پیش‌فرض بفرستد
            const textToSend = userText ? userText : "کاربر متنی وارد نکرد، این یک سیگنال خودکار است. 🚀";
            
            // فرستادن مستقیم متن داخل تکست‌اریا به ربات بله
            webapp.sendData(textToSend);
        });

        // عملکرد دکمه بستن
        document.getElementById('close-btn').addEventListener('click', () => {
            webapp.close();
        });
    </script>
</body>
</html>
